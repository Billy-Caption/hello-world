version: 2.1


jobs:
  code-quality-check-and-test:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: code quality check
          command: |
            pip install uv && uv sync
      - run:
          name: code quality check
          command: |
            uv run black . --check --line-length 255
            uv run ruff check --line-length 255 .
      - run:
          name: run tests
          command:
            uv run pytest

workflows:
  publish-package-to-code-artifact:
    jobs:
      - code-quality-check-and-test

